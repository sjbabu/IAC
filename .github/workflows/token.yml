name: Testing token
on: workflow_dispatch
jobs:
  testtoken:
    runs-on: ubuntu-latest
    steps:
    - name: print token
      run: |
        echo "${{ secrets.GITHUB_TOKEN }}"
    - name: Checkout Other Repository
      uses: actions/checkout@v4
      with:
          repository: sjbabu/cicd
          token: ${{ secrets.MY_CICD_TOKEN }}
